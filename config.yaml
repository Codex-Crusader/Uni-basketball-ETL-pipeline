app:
  name: "Basketball Game Outcome Predictor"
  version: "2.5.1"             # v2.5.1 — fair hyperparameters, best model wins on merit
  debug: true
  port: 5000
  host: "0.0.0.0"

# HOME TEAM - the team this instance "roots for"
# All predictions are framed as: home_team vs <chosen opponent>
# Stats are auto-filled from their season averages in the dataset
home_team:
  name: "Duke Blue Devils"       # Change to your team
  espn_id: "150"                 # ESPN team ID (150 = Duke). Used for direct team lookups.
  court_name: "Cameron Indoor Stadium"


# AUTO-LEARNING SCHEDULER
# Runs in the background when --serve is active.
# Fetches new games -> retrains -> promotes only if model improves.
auto_learn:
  enabled: true
  fetch_interval_hours: 6
  retrain_interval_hours: 24
  min_new_games_to_retrain: 15
  promote_threshold: 0.002
  learning_log_file: "data/learning_log.json"


# DATA STORAGE
data:
  dir: "data"
  local_file: "data/games.json"
  test_size: 0.2
  random_state: 42
  min_games_required: 50

  # v2.5: feature fields store PRE-GAME ROLLING AVERAGES, not in-game stats.
  # Run --enrich to back-fill existing data, then retrain.
  # Do NOT add score-derived fields (ppg, eff_score) back here — that's leakage.
  features:
    - home_fg_pct
    - away_fg_pct
    - home_rebounds
    - away_rebounds
    - home_assists
    - away_assists
    - home_turnovers
    - away_turnovers
    - home_steals
    - away_steals
    - home_blocks
    - away_blocks
    - home_ast_to_tov
    - away_ast_to_tov

  label: "outcome"

  # How many prior games to average for pre-game features.
  pregame_window: 10

  # Minimum prior games a team must have before their game is included in training.
  pregame_min_games: 1

  # Leakage detection threshold
  leakage_correlation_threshold: 0.70

# NCAA API - ESPN (no key required, unofficial)
ncaa_api:
  provider: "espn"
  season: 2024               # Legacy fallback if seasons list absent

  seasons:
    - 2022
    - 2023
    - 2024

  max_games: 3000
  rate_limit_delay: 0.4

  espn:
    base_url: "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball"
    scoreboard_path: "/scoreboard"
    summary_path: "/summary"
    page_size: 25
    teams_path: "/teams"
    athletes_path: "/athletes"

  custom:
    base_url: ""
    api_key: ""
    games_endpoint: "/games"
    season_param: "season"
    field_map:
      game_id: "id"
      home_team: "home_team"
      away_team: "away_team"
      home_score: "home_score"
      away_score: "away_score"


# SNOWFLAKE  (keep disabled until credentials are available)
snowflake:
  enabled: false
  user: ""
  password: ""
  account: ""
  warehouse: ""
  database: ""
  schema: ""
  table: "BASKETBALL_GAMES"

# ROSTER - ESPN player roster fetching and caching
roster:
  cache_dir: "data/rosters"
  team_id_cache: "data/team_ids.json"
  cache_ttl_hours: 24
  min_players_to_show: 5

# ROLLING STATS - last-N-games averages (dashboard window selector)
rolling:
  default_window: 12
  available_windows: [5, 10, 15, 20]

# MODEL REGISTRY & VERSIONING
models:
  dir: "models"
  registry_file: "models/registry.json"
  selection_metric: "roc_auc"
  keep_top_n: 10

  enabled:
    - gradient_boosting
    - random_forest
    - extra_trees
    - svm
    - mlp
    - xgboost

  # v2.5.1: FAIR HYPERPARAMETERS — each model gets a proper chance.
  #
  # v2.4 over-regularized everything defensively (min_samples_leaf=4,
  # min_samples_split=10, MLP shrunk to [64,32]). With 2900 games and
  # 14 features that was too tight and handicapped models unevenly.
  #
  # Note: max_depth for tree models is also subject to _adaptive_depth()
  # in main.py which caps depth based on dataset size. At ~2300 training
  # samples with 14 features the ceiling is depth=4 regardless of what's
  # set here — so RF and Extra Trees effectively run at depth 4.
  # GBM and XGBoost are already at 4 so they're unaffected.

  gradient_boosting:
    n_estimators: 300          # v2.5.1: raised from 200 — more trees = better ensemble
    learning_rate: 0.05
    max_depth: 4               # adaptive ceiling is also 4 — this is the real limit
    subsample: 0.8
    min_samples_split: 5       # v2.5.1: restored from 10 — was too aggressive
    min_samples_leaf: 2        # v2.5.1: added explicitly at reasonable value
    random_state: 42

  random_forest:
    n_estimators: 300          # v2.5.1: raised from 200
    max_depth: 10              # adaptive scaler caps this at 4 for current data size
    min_samples_split: 5       # v2.5.1: restored from 10
    min_samples_leaf: 2        # v2.5.1: restored from 4 — 4 was too restrictive
    random_state: 42

  extra_trees:
    n_estimators: 300          # v2.5.1: raised from 200
    max_depth: 10              # adaptive scaler caps this at 4 for current data size
    min_samples_split: 5       # v2.5.1: restored from 10
    min_samples_leaf: 2        # v2.5.1: restored from 4
    random_state: 42

  svm:
    kernel: "rbf"
    C: 2.0                     # v2.5.1: raised from 1.0 — allows tighter fit on clean data
    gamma: "scale"
    probability: true
    random_state: 42

  mlp:
    hidden_layer_sizes: [128, 64, 32]  # v2.5.1: RESTORED from [64,32] — was unfairly shrunk
    activation: "relu"                  # MLP at [64,32] was handicapped vs the others
    max_iter: 500
    early_stopping: true
    validation_fraction: 0.15
    random_state: 42

  xgboost:
    n_estimators: 300          # v2.5.1: raised from 200
    learning_rate: 0.05
    max_depth: 5               # v2.5.1: raised from 4, adaptive will cap at 4 anyway
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3        # v2.5.1: added — XGBoost's equivalent of min_samples_leaf
    use_label_encoder: false
    eval_metric: "logloss"
    random_state: 42
